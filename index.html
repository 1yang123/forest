<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专注小森林</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="专注小森林">
    <link rel="apple-touch-icon" href="icon.jpg">
    
    <style>
        :root {
            --bg-color: #FDFDFD;
            --primary-green: #A8C69F; /* 森系浅绿 */
            --wood-color: #D2B48C;    /* 原木色 */
            --text-color: #555;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* 飘动叶子动画背景 */
        .leaf-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            display: none;
        }
        .leaf {
            position: absolute; width: 20px; height: 20px;
            background: var(--primary-green);
            opacity: 0.3; border-radius: 0 100%;
            animation: fall 10s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); left: 10%; }
            100% { transform: translateY(110vh) rotate(360deg); left: 90%; }
        }

        /* 页面状态切换 */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; }
        .active { display: flex; }

        /* 按钮样式 */
        .btn-group { display: flex; gap: 20px; margin-bottom: 40px; }
        .time-btn {
            padding: 15px 25px; border: 2px solid var(--primary-green);
            background: none; color: var(--primary-green);
            border-radius: 12px; font-size: 18px; transition: 0.2s;
        }
        .time-btn.selected { background: var(--primary-green); color: white; }
        
        .start-btn {
            background: var(--wood-color); color: white;
            padding: 15px 60px; border: none; border-radius: 30px;
            font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* 倒计时数字 */
        #timer-display { font-size: 80px; font-weight: 200; margin-bottom: 20px; }
        .status-tip { color: var(--primary-green); letter-spacing: 2px; }

        /* 树木生长动画 */
        .tree-box { width: 100px; height: 100px; position: relative; margin-bottom: 20px; }
        .tree { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            background: var(--primary-green); width: 4px; height: 0;
            transition: height 2s ease-in-out;
        }
        .tree.grow { height: 60px; }
        .tree::after {
            content: '🍃'; position: absolute; top: -15px; left: -8px;
            opacity: 0; transition: 0.5s 1.5s;
        }
        .tree.grow::after { opacity: 1; }

        /* 底部区域 */
        footer { padding: 20px; font-size: 12px; color: #BBB; }
    </style>
</head>
<body>

    <div class="leaf-container" id="leafLayer"></div>

    <div id="home-screen" class="screen active">
        <div class="btn-group">
            <button class="time-btn" onclick="selectTime(5, this)">5 min</button>
            <button class="time-btn" onclick="selectTime(10, this)">10 min</button>
            <button class="time-btn" onclick="selectTime(20, this)">20 min</button>
        </div>
        <button id="start-node" class="start-btn" style="display:none;" onclick="startFocus()">开始专注</button>
    </div>

    <div id="focus-screen" class="screen">
        <div id="timer-display">00:00</div>
        <div class="status-tip">专注中...</div>
    </div>

    <div id="result-screen" class="screen">
        <div class="tree-box"><div class="tree" id="myTree"></div></div>
        <div class="status-tip">恭喜！专注成功，种下一棵小树～</div>
    </div>

    <footer>专注小森林 | 治愈每一刻</footer>

    <script>
        let timeLeft = 0;
        let timerInterval = null;

        function selectTime(min, btn) {
            timeLeft = min * 60;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('start-node').style.display = 'block';
        }

        function startFocus() {
            showScreen('focus-screen');
            document.getElementById('leafLayer').style.display = 'block';
            createLeaves();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    completeFocus();
                }
            }, 1000);
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function completeFocus() {
            clearInterval(timerInterval);
            document.getElementById('leafLayer').style.display = 'none';
            showScreen('result-screen');
            
            // 触发生长动画
            setTimeout(() => {
                document.getElementById('myTree').classList.add('grow');
            }, 100);

            // 3秒后返回首页
            setTimeout(() => {
                location.reload(); // 简单重置
            }, 4000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createLeaves() {
            const container = document.getElementById('leafLayer');
            for(let i=0; i<10; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.style.left = Math.random() * 100 + '%';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(leaf);
            }
        }
    </script>
</body>
</html>
