<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专注小森林</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg: #F7F8F6;
            --leaf: #8BA888;
            --trunk: #967E67;
            --text: #3E4A3D;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        /* 动态背景：缓慢飘落的粒子 */
        .bg-elements {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .dot {
            position: absolute; background: var(--leaf);
            border-radius: 50%; opacity: 0.15;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) translateX(0); }
            100% { transform: translateY(-10vh) translateX(50px); }
        }

        /* 容器动画 */
        .container {
            position: relative; z-index: 10;
            text-align: center; width: 100%;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 首页：时间选择 */
        .time-picker {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 60px;
        }
        .option {
            width: 70px; height: 70px; border-radius: 50%;
            border: 1px solid rgba(139, 168, 136, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--leaf);
            transition: 0.4s; background: var(--glass);
            backdrop-filter: blur(5px);
        }
        .option.active {
            background: var(--leaf); color: white;
            transform: scale(1.1); border-color: var(--leaf);
            box-shadow: 0 10px 20px rgba(139, 168, 136, 0.2);
        }

        /* 倒计时数字：大而轻灵 */
        .timer-val {
            font-size: 100px; font-weight: 200; letter-spacing: -2px;
            margin: 20px 0; font-variant-numeric: tabular-nums;
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }

        /* 按钮：拟物触感 */
        .action-btn {
            margin-top: 40px; padding: 16px 50px;
            border-radius: 40px; border: none;
            background: var(--trunk); color: white;
            font-size: 18px; letter-spacing: 2px;
            box-shadow: 0 8px 15px rgba(150, 126, 103, 0.2);
            transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.92); opacity: 0.9; }

        /* 树木SVG动画 */
        .tree-svg {
            width: 120px; height: 120px; margin-bottom: 20px;
            visibility: hidden; transform: scale(0.5); transition: 1s;
        }
        .tree-svg.show { visibility: visible; transform: scale(1.2); }

        /* 提示文字 */
        .tip { font-size: 14px; opacity: 0.5; margin-top: 20px; }

        /* 隐藏/显示逻辑 */
        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px); position: absolute; }
        
        footer {
            position: absolute; bottom: 40px; width: 100%;
            font-size: 12px; letter-spacing: 4px; opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="bg-elements" id="dots"></div>

    <div id="scene-home" class="container">
        <div class="time-picker">
            <div class="option" onclick="set(5, this)">5m</div>
            <div class="option active" onclick="set(10, this)">10m</div>
            <div class="option" onclick="set(20, this)">20m</div>
        </div>
        <button class="action-btn" onclick="go()">开始专注</button>
        <div class="tip">暂别屏幕，种下静谧</div>
    </div>

    <div id="scene-focus" class="container hidden">
        <div class="timer-val" id="display">10:00</div>
        <div style="color: var(--leaf); font-weight: 300;">深呼吸，森林在生长</div>
    </div>

    <div id="scene-done" class="container hidden">
        <svg class="tree-svg" id="forest-tree" viewBox="0 0 100 100">
            <path d="M50 85 L50 40" stroke="#967E67" stroke-width="4" fill="none" />
            <circle cx="50" cy="35" r="15" fill="#8BA888" />
            <circle cx="40" cy="45" r="12" fill="#8BA888" opacity="0.8" />
            <circle cx="60" cy="45" r="12" fill="#8BA888" opacity="0.8" />
        </svg>
        <div style="font-size: 20px; margin-top: 10px;">专注达成</div>
        <div class="tip">你又为森林增添了一抹新绿</div>
        <button class="action-btn" style="background: var(--leaf); margin-top: 50px;" onclick="reset()">回到起点</button>
    </div>

    <footer>FOREST CALM</footer>

    <script>
        let time = 600;
        let timer = null;

        // 生成背景粒子
        const dotsContainer = document.getElementById('dots');
        for(let i=0; i<15; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.width = dot.style.height = Math.random() * 10 + 5 + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.animationDelay = Math.random() * 10 + 's';
            dotsContainer.appendChild(dot);
        }

        function set(m, el) {
            time = m * 60;
            document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(time / 60);
            const s = time % 60;
            document.getElementById('display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }

        function go() {
            switchScene('scene-home', 'scene-focus');
            document.body.style.background = "#F0F2EE";
            timer = setInterval(() => {
                time--;
                updateDisplay();
                if(time <= 0) finish();
            }, 1000);
        }

        function finish() {
            clearInterval(timer);
            switchScene('scene-focus', 'scene-done');
            document.body.style.background = "#F7F8F6";
            setTimeout(() => {
                document.getElementById('forest-tree').classList.add('show');
            }, 300);
        }

        function reset() {
            location.reload();
        }

        function switchScene(outId, inId) {
            document.getElementById(outId).classList.add('hidden');
            setTimeout(() => {
                document.getElementById(outId).style.display = 'none';
                const next = document.getElementById(inId);
                next.style.display = 'block';
                setTimeout(() => next.classList.remove('hidden'), 50);
            }, 800);
        }
    </script>
</body>
</html>
